services:
  pi:
    build: .
    image: pi
    stdin_open: true
    tty: true
    volumes:
    - ./workspace:/workspace
    - config:/home/pi/.pi
    environment:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - RDMO_URL=${RDMO_URL:-}
    - RDMO_TOKEN=${RDMO_TOKEN:-}
    working_dir: /workspace

volumes:
  config:
